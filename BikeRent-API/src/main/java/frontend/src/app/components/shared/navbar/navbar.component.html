<style>
  nav {
    display: flex;
    justify-content: space-around;
    padding: 10px;
  }

  a {
    color: black;
    text-decoration: none;
  }

  nav a.active {
    color: red;
  }
</style>

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="javascript:void(0)">BSN</a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a [routerLink]="['/dashboard']" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
        </li>
      </ul>
      <form class="d-flex gap-2 align-items-center" role="search" (submit)="false">
        <input class="form-control" type="search" placeholder="Find a book" aria-label="Search" />
        <span>Welcome</span>
        <span class="text-capitalize fw-bold">alibou</span>
        <button class="btn btn-link" type="button" (click)="logout()">
          <i class="fas fa-door-open"></i>
        </button>
      </form>
    </div>
  </div>
</nav>
